
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Живые отправки</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
text-align:center;
}

h1{
margin-bottom:5px;
}

.subtitle{
opacity:0.6;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:12px 18px;
border-radius:10px;
box-shadow:0 5px 18px rgba(0,0,0,0.1);
font-weight:600;
}

#map{
height:420px;
max-width:950px;
margin:auto;
border-radius:12px;
overflow:hidden;
}

.feed{
margin-top:25px;
max-width:650px;
margin-left:auto;
margin-right:auto;
}

.order{
background:white;
padding:14px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
text-align:left;
line-height:1.5;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:10px 14px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
font-size:14px;
display:none;
}

.online{
margin-top:15px;
font-weight:600;
}
</style>

</head>

<body>

<h1>📦 Живые отправки</h1>
<div class="subtitle">Последние оформленные заказы</div>

<div class="stats">
<div class="card">Сегодня: <span id="today">28</span></div>
<div class="card">За месяц: <span id="month">912</span></div>
<div class="card">Клиентов: <span id="clients">4387</span></div>
</div>

<div class="online" id="onlineUsers">👀 Сейчас на сайте: 12 человек</div>

<div id="map"></div>

<div class="feed" id="feed"></div>

<div class="popup" id="popup"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([53.7098,27.9534],6);

L.tileLayer('https://core-renderer-tiles.maps.yandex.net/tiles?l=map&v=21.03.16-0&x={x}&y={y}&z={z}&scale=1&lang=ru_RU', {
 attribution: '© Yandex Maps'
}).addTo(map);

var cities=[
{name:"Минск",coords:[53.9006,27.5590]},
{name:"Брест",coords:[52.0976,23.7341]},
{name:"Гомель",coords:[52.4345,30.9754]},
{name:"Витебск",coords:[55.1904,30.2049]},
{name:"Гродно",coords:[53.6694,23.8131]},
{name:"Могилёв",coords:[53.8945,30.3304]},
{name:"Бобруйск",coords:[53.1384,29.2214]},
{name:"Пинск",coords:[52.1229,26.0951]},
{name:"Барановичи",coords:[53.1327,26.0139]},
{name:"Лида",coords:[53.8875,25.2997]},
{name:"Орша",coords:[54.5081,30.4172]},
{name:"Солигорск",coords:[52.7876,27.5415]}
];

var products=[
"iPhone 13",
"iPhone 13 Pro",
"iPhone 13 Pro Max",
"iPhone 14",
"iPhone 14 Pro",
"iPhone 14 Pro Max",
"iPhone 15",
"iPhone 15 Pro",
"iPhone 15 Pro Max",
"iPhone 16 Pro",
"iPhone 16 Pro Max",
"iPhone 17 Pro Max",
"MacBook Air",
"MacBook Pro",
"iPad Pro",
"iPad Air"
];

var names=["Алексей","Андрей","Игорь","Максим","Дмитрий","Сергей","Олег","Павел","Илья"];

function addOrder(){

var city=cities[Math.floor(Math.random()*cities.length)];
var product=products[Math.floor(Math.random()*products.length)];
var name=names[Math.floor(Math.random()*names.length)];

L.marker(city.coords).addTo(map)
.bindPopup("📦 "+product+" → "+city.name);

var feed=document.getElementById("feed");

var div=document.createElement("div");
div.className="order";
div.innerHTML=
"<b>📦 "+product+"</b><br>📍 "+city.name+"<br>🚚 Только что оформлено на отправку";

feed.prepend(div);

if(feed.children.length>12){
feed.removeChild(feed.lastChild);
}

showPopup(name,product,city.name);

}

function showPopup(name,product,city){

var popup=document.getElementById("popup");

popup.innerHTML="🟢 "+name+" из "+city+" купил "+product;
popup.style.display="block";

setTimeout(function(){
popup.style.display="none";
},5000);

}

function updateUsers(){

let users=Math.floor(Math.random()*12)+8;
document.getElementById("onlineUsers").innerText="👀 Сейчас на сайте: "+users+" человек";

}

updateUsers();

setInterval(updateUsers,12000);
setInterval(addOrder,20000);

</script>

</body>
</html>
