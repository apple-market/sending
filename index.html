function rand(a){return a[Math.floor(Math.random()*a.length)];}

function getPolandTime(){
const now=new Date();
return new Date(now.toLocaleString("en-US",{timeZone:"Europe/Warsaw"}));
}

function render(){

document.getElementById("feed").innerHTML="";
map.eachLayer(function(l){if(l instanceof L.Marker) map.removeLayer(l);});

let count=Math.floor(Math.random()*4)+5;

for(let i=0;i<count;i++){

let city=rand(cities);
let name=rand(names);
let product=rand(products);

L.marker(city.coords).addTo(map);

let div=document.createElement("div");
div.className="order";
div.innerHTML="<b>📦 "+product+"</b><br>👤 "+name+" — "+city.name+"<br>🚚 Оформлено на сегодняшнюю отправку";

document.getElementById("feed").appendChild(div);

}

document.getElementById("todayCount").innerText=count;

}

function showDate(){
const d=getPolandTime();
document.getElementById("todayDate").innerText=d.toLocaleDateString("ru-RU");
}
