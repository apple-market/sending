<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Живые отправки</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family:Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:25px;
text-align:center;
}

h1{margin-bottom:10px;}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.card{
background:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 5px 18px rgba(0,0,0,0.1);
font-size:18px;
font-weight:600;
}

#map{
height:420px;
max-width:900px;
margin:auto;
border-radius:12px;
overflow:hidden;
}

.feed{
margin-top:30px;
max-width:650px;
margin-left:auto;
margin-right:auto;
}

.order{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
text-align:left;
font-size:15px;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:12px 16px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
font-size:14px;
display:none;
}
</style>
</head>

<body>

<h1>📦 Живые отправки магазина</h1>

<div class="stats">
<div class="card">Сегодня: <span id="today">24</span></div>
<div class="card">За месяц: <span id="month">742</span></div>
<div class="card">Клиентов: <span id="clients">4382</span></div>
</div>

<div id="map"></div>

<div class="feed" id="feed"></div>

<div class="popup" id="popup"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([53.7098,27.9534],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

var cities=[
{name:"Минск",coords:[53.9006,27.5590]},
{name:"Брест",coords:[52.0976,23.7341]},
{name:"Гомель",coords:[52.4345,30.9754]},
{name:"Витебск",coords:[55.1904,30.2049]},
{name:"Гродно",coords:[53.6694,23.8131]},
{name:"Могилёв",coords:[53.8945,30.3304]},
{name:"Бобруйск",coords:[53.1384,29.2214]},
{name:"Пинск",coords:[52.1229,26.0951]},
{name:"Барановичи",coords:[53.1327,26.0139]},
{name:"Лида",coords:[53.8875,25.2997]},
{name:"Орша",coords:[54.5081,30.4172]},
{name:"Солигорск",coords:[52.7876,27.5415]}
];

var products=[
"iPhone 15 Pro",
"AirPods Pro",
"MacBook Air",
"Apple Watch",
"AirPods 3",
"iPhone 14",
"MacBook Pro"
];

var names=["Алексей","Андрей","Игорь","Максим","Дмитрий","Сергей","Олег"];

function addOrder(){

var city=cities[Math.floor(Math.random()*cities.length)];
var product=products[Math.floor(Math.random()*products.length)];
var name=names[Math.floor(Math.random()*names.length)];

L.marker(city.coords).addTo(map)
.bindPopup("📦 "+product+" → "+city.name);

var feed=document.getElementById("feed");

var div=document.createElement("div");
div.className="order";
div.innerHTML="📦 <b>"+product+"</b> → "+city.name+" — только что отправлено";

feed.prepend(div);

if(feed.children.length>10){
feed.removeChild(feed.lastChild);
}

showPopup(name,product,city.name);

}

function showPopup(name,product,city){

var popup=document.getElementById("popup");

popup.innerHTML="🟢 "+name+" из "+city+" купил "+product;
popup.style.display="block";

setTimeout(function(){
popup.style.display="none";
},5000);

}

setInterval(addOrder,15000);

</script>

</body>
</html>
