function getPolandTime(){
const now=new Date();
return new Date(now.toLocaleString("en-US",{timeZone:"Europe/Warsaw"}));
}

function seededRandom(seed){
return function(){
seed|=0;seed=seed+0x6D2B79F5|0;
var t=Math.imul(seed^seed>>>15,1|seed);
t=t+Math.imul(t^t>>>7,61|t)^t;
return((t^t>>>14)>>>0)/4294967296;
}
}

function generateSchedule(){
const d=getPolandTime();
const seed=parseInt(d.getFullYear()+""+(d.getMonth()+1)+""+d.getDate());
const rand=seededRandom(seed);

let count=Math.floor(rand()*4)+5;
let current=11*60;
let schedule=[];

for(let i=0;i<count;i++){
current+=Math.floor(rand()*60)+60;
if(current>17*60+30)break;

let city=cities[Math.floor(rand()*cities.length)];
let name=names[Math.floor(rand()*names.length)];
let product=products[Math.floor(rand()*products.length)];

schedule.push({time:current,city:city,name:name,product:product});
}

return schedule;
}

var shown=0;

function render(){
document.getElementById("feed").innerHTML="";
map.eachLayer(function(l){if(l instanceof L.Marker) map.removeLayer(l);});

const now=getPolandTime();
const nowMin=now.getHours()*60+now.getMinutes();

const schedule=generateSchedule();
let visible=[];

schedule.forEach(o=>{
if(o.time<=nowMin){
visible.push(o);
L.marker(o.city.coords).addTo(map);

let div=document.createElement("div");
div.className="order";
div.innerHTML="<b>📦 "+o.product+"</b><br>👤 "+o.name+" — "+o.city.name+"<br>🚚 Оформлено на сегодняшнюю отправку";
document.getElementById("feed").appendChild(div);
}
});

document.getElementById("todayCount").innerText=visible.length;

if(shown<visible.length){
let o=visible[shown];
shown++;
var popup=document.getElementById("popup");
popup.innerHTML="🟢 "+o.name+" из "+o.city.name+" оформил "+o.product;
popup.style.display="block";
setTimeout(()=>popup.style.display="none",5000);
}
}

function showDate(){
const d=getPolandTime();
document.getElementById("todayDate").innerText=d.toLocaleDateString("ru-RU");
}

showDate();
render();
setInterval(render,300000);
